{% extends 'public/layout.html' %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="pub-section min-h-[80vh] flex flex-col items-center justify-center px-4 text-center">
  <!-- Background glows -->
  <div class="absolute top-1/3 left-1/3 w-72 h-72 bg-purple-600/8 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/3 right-1/3 w-56 h-56 bg-cyan-500/6 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative z-10 max-w-lg">
    <!-- Glitchy 404 -->
    <div class="font-display font-bold leading-none mb-6 select-none"
         style="font-size: clamp(6rem, 20vw, 10rem); background: linear-gradient(135deg, rgba(139,92,246,0.25), rgba(6,182,212,0.2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-shadow: none;">
      404
    </div>

    <div class="w-16 h-px mx-auto mb-6" style="background: linear-gradient(90deg, transparent, rgba(139,92,246,0.5), transparent);"></div>

    <h1 class="font-display font-bold text-2xl text-white tracking-tight mb-3">Page Not Found</h1>
    <p class="text-slate-500 text-sm leading-relaxed mb-10">
      The page you're looking for doesn't exist or has been moved.
    </p>

    <div class="flex flex-wrap items-center justify-center gap-4">
      <a href="{{ url_for('public_home') }}"
         class="inline-flex items-center gap-2 bg-gradient-to-r from-violet-600 to-purple-600 hover:from-violet-500 hover:to-purple-500 text-white font-semibold text-sm px-6 py-3 rounded-xl shadow-lg shadow-purple-900/40 transition-all hover:-translate-y-0.5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Go Home
      </a>
      <a href="{{ url_for('pub_teams') }}"
         class="inline-flex items-center gap-2 bg-white/5 border border-white/10 hover:bg-white/8 text-slate-300 hover:text-white font-medium text-sm px-6 py-3 rounded-xl transition-all">
        Browse Teams
      </a>
    </div>
  </div>
</div>
{% endblock %}
