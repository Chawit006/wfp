{% extends 'layout.html' %}
{% block title %}Add Match Result{% endblock %}
{% block page_title %}Record Match Result{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-[#0d0d24] border border-purple-900/15 rounded-xl overflow-hidden">
        <div class="px-6 py-5 border-b border-purple-900/15 bg-[#0a0a1e] flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-600/25 to-purple-800/25 border border-purple-500/20 flex items-center justify-center flex-shrink-0">
                <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
            </div>
            <div>
                <h2 class="font-semibold text-slate-200 leading-tight">Match Information</h2>
                <p class="text-xs text-slate-600 mt-0.5">Record the outcome of a tournament match.</p>
            </div>
        </div>

        <form method="POST" action="{{ url_for('results_create') }}" class="px-6 py-6 space-y-5">

            <!-- Team + Tournament -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="team_id" class="block text-[10px] font-semibold text-slate-500 uppercase tracking-[0.14em] mb-1.5">
                        Our Team <span class="text-red-400">*</span>
                    </label>
                    <select id="team_id" name="team_id"
                            class="w-full bg-[#111130] border border-purple-900/30 text-slate-100 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500/60 focus:ring-2 focus:ring-purple-500/15 transition-all">
                        <option value="">Select team...</option>
                        {% for t in all_teams %}
                        <option value="{{ t['id'] }}" {% if form.get('team_id')|string == t['id']|string %}selected{% endif %}>
                            {{ t['name'] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="tournament_id" class="block text-[10px] font-semibold text-slate-500 uppercase tracking-[0.14em] mb-1.5">
                        Tournament <span class="text-red-400">*</span>
                    </label>
                    <select id="tournament_id" name="tournament_id"
                            class="w-full bg-[#111130] border border-purple-900/30 text-slate-100 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500/60 focus:ring-2 focus:ring-purple-500/15 transition-all">
                        <option value="">Select tournament...</option>
                        {% for t in all_tournaments %}
                        <option value="{{ t['id'] }}" {% if form.get('tournament_id')|string == t['id']|string %}selected{% endif %}>
                            {{ t['name'] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Opponent -->
            <div>
                <label for="opponent" class="block text-[10px] font-semibold text-slate-500 uppercase tracking-[0.14em] mb-1.5">
                    Opponent Team <span class="text-red-400">*</span>
                </label>
                <input type="text" id="opponent" name="opponent" value="{{ form.get('opponent', '') }}"
                       placeholder="e.g., FaZe Clan"
                       class="w-full bg-[#111130] border border-purple-900/30 text-slate-100 placeholder-slate-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500/60 focus:ring-2 focus:ring-purple-500/15 transition-all">
            </div>

            <!-- Result + Score -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="result" class="block text-[10px] font-semibold text-slate-500 uppercase tracking-[0.14em] mb-1.5">
                        Result <span class="text-red-400">*</span>
                    </label>
                    <select id="result" name="result"
                            class="w-full bg-[#111130] border border-purple-900/30 text-slate-100 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500/60 focus:ring-2 focus:ring-purple-500/15 transition-all">
                        <option value="">Select result...</option>
                        <option value="WIN"  {% if form.get('result') == 'WIN'  %}selected{% endif %}>WIN</option>
                        <option value="LOSS" {% if form.get('result') == 'LOSS' %}selected{% endif %}>LOSS</option>
                        <option value="DRAW" {% if form.get('result') == 'DRAW' %}selected{% endif %}>DRAW</option>
                    </select>
                </div>
                <div>
                    <label for="score" class="block text-[10px] font-semibold text-slate-500 uppercase tracking-[0.14em] mb-1.5">
                        Score <span class="text-red-400">*</span>
                    </label>
                    <input type="text" id="score" name="score" value="{{ form.get('score', '') }}"
                           placeholder="e.g., 16-10 or 2-1"
                           class="w-full bg-[#111130] border border-purple-900/30 text-slate-100 placeholder-slate-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500/60 focus:ring-2 focus:ring-purple-500/15 transition-all font-mono">
                </div>
            </div>

            <!-- MVP + Match Date -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="mvp" class="block text-[10px] font-semibold text-slate-500 uppercase tracking-[0.14em] mb-1.5">
                        MVP <span class="text-slate-700 font-normal normal-case tracking-normal">(optional)</span>
                    </label>
                    <input type="text" id="mvp" name="mvp" value="{{ form.get('mvp', '') }}"
                           placeholder="e.g., s1mple"
                           class="w-full bg-[#111130] border border-purple-900/30 text-slate-100 placeholder-slate-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500/60 focus:ring-2 focus:ring-purple-500/15 transition-all">
                </div>
                <div>
                    <label for="match_date" class="block text-[10px] font-semibold text-slate-500 uppercase tracking-[0.14em] mb-1.5">
                        Match Date <span class="text-red-400">*</span>
                    </label>
                    <input type="date" id="match_date" name="match_date" value="{{ form.get('match_date', '') }}"
                           class="w-full bg-[#111130] border border-purple-900/30 text-slate-100 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500/60 focus:ring-2 focus:ring-purple-500/15 transition-all">
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex items-center gap-3 pt-2 border-t border-purple-900/10 mt-6">
                <button type="submit"
                        class="inline-flex items-center gap-2 bg-gradient-to-r from-violet-600 to-purple-600 hover:from-violet-500 hover:to-purple-500 text-white font-semibold px-6 py-2.5 rounded-lg text-sm transition-all shadow-lg shadow-purple-900/30 hover:shadow-purple-900/50 hover:-translate-y-0.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                    Record Result
                </button>
                <a href="{{ url_for('results_index') }}"
                   class="inline-flex items-center gap-2 bg-white/5 hover:bg-white/8 border border-white/10 text-slate-400 hover:text-slate-200 px-6 py-2.5 rounded-lg text-sm transition-all font-medium">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
